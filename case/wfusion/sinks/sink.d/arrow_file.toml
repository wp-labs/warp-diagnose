[[connectors]]
id = "arrow_file"
type = "arrow-file"
allow_override = ["base", "file", "tag", "fields", "sync"]

[connectors.params]
base = "alerts"
file = "default.arrow"
tag = "wf_alert"
sync = false
fields = [
  { name = "__wfu_id", type = "chars" },
  { name = "__wfu_rule_name", type = "chars" },
  { name = "__wfu_score", type = "float" },
  { name = "__wfu_entity_type", type = "chars" },
  { name = "__wfu_entity_id", type = "chars" },
  { name = "__wfu_origin", type = "chars" },
  { name = "__wfu_close_reason", type = "chars" },
  { name = "__wfu_fired_at", type = "chars" },
  { name = "__wfu_emit_time", type = "chars" },
  { name = "__wfu_summary", type = "chars" },
  { name = "target", type = "chars" },
  { name = "subject", type = "chars" },
  { name = "action", type = "chars" },
  { name = "status", type = "chars" },
  { name = "event_count", type = "digit" },
  { name = "message", type = "chars" },
]
