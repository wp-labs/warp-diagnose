# 语义词典外部配置（知识配置）
# 文件位置：models/knowledge/semantic_dict.toml
# 用于扩展或替换系统内置的语义词典

version = 1

# 配置模式：
#   - "add"：将下面的词汇添加到系统内置词典（默认，推荐）
#   - "replace"：用下面的词汇完全替换系统内置词典
mode = "add"

# 停用词（可选）
[stop_words]
english = [
  "all",
  "call",
  "context",
  "data",
  "depth",
  "event",
  "file",
  "files",
  "frame",
  "group",
  "kind",
  "key",
  "line_max",
  "name",
  "no",
  "parallel",
  "path",
  "pending_cnt",
  "proc",
  "src",
  "src_key",
  "stat",
  "target",
  "times",
  "total",
  "users",
  "wait",
  "with",
]
chinese = ["个数据源"]

# 日志领域关键词（可选）
# 注意：支持任意自定义分类名，不局限于下面的例子
[domain_words]
# 基于 data/in_dat/wparse.log 高频 content 抽取
# 用于快速识别：主体(subject) / 客户(customer) / 行为(behavior)
