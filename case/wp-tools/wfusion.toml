mode = "batch"
sinks = "sinks"

[[sources]]
type = "file"
name = "wparse_seed"
path = "data/out_dat/wp-log.arrow"
stream = "wparse"
format = "arrow_framed"

[runtime]
executor_parallelism = 2
rule_exec_timeout = "30s"
schemas = "models/schemas/*.wfs"
rules = "models/rules/*.wfl"

[window_defaults]
evict_interval = "30s"
max_window_bytes = "128MB"
max_total_bytes = "1GB"
evict_policy = "time_first"
watermark = "3s"
allowed_lateness = "365d"
late_policy = "drop"

[window.wparse_events]
mode = "local"
max_window_bytes = "128MB"
over_cap = "60m"

[window.semantic_events]
mode = "local"
max_window_bytes = "64MB"
over_cap = "2h"

[window.risk_alerts]
mode = "local"
max_window_bytes = "64MB"
over_cap = "2h"

[window.entity_stats]
mode = "local"
max_window_bytes = "64MB"
over_cap = "2h"

[vars]
PREP_THRESHOLD = "2"
RUN_THRESHOLD = "3"
ANOMALY_THRESHOLD = "2"

[logging]
level = "info"
format = "plain"
file = "logs/wfusion.log"
