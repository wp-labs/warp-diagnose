version = "1.0"
robust = "normal"
skip_parse = false
skip_sink = false

[models]
wpl = "${CASE_PATH}/models/wpl"
oml = "${CASE_PATH}/models/oml"
knowledge = "${CASE_PATH}/models/knowledge"
[topology]
sources = "./topology/sources"
sinks = "./topology/sinks"

[performance]
rate_limit_rps = 20000
parse_workers = 2

[rescue]
path = "./data/rescue"

[log_conf]
level = "warn,ctrl=info,data=error,matrc=error,dfx=warn,kdb=warn"
output = "File"

[log_conf.file]
path = "${CASE_PATH}/data/logs/"

[[stat.pick]]
key = "pick_stat"
target = "*"

[[stat.parse]]
key = "parse_stat"
target = "*"

[[stat.sink]]
key = "sink_stat"
target = "*"

[semantic]
enabled = true
